apiVersion: v1
kind: ConfigMap
metadata:
  name: thoughty-config
  namespace: thoughty
data:
  NODE_ENV: "production"
  PORT: "3001"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  # Optional comma-separated PostgreSQL read replicas. Leave empty to route all queries to POSTGRES_HOST.
  POSTGRES_READ_REPLICA_HOSTS: ""
  POSTGRES_READ_REPLICA_PORTS: ""
  # Browser origin(s) allowed to call the API. Replace with your real ingress host.
  CORS_ORIGIN: "https://thoughty.example.com"
  # Base URL used to build links in transactional emails. Replace with your ingress host.
  FRONTEND_URL: "https://thoughty.example.com"
  # Access token lifetime (consumed by @nestjs/jwt sign options).
  JWT_EXPIRES_IN: "15m"
  # Object storage (non-secret parts). Credentials are injected via Vault.
  # Replace with your real S3-compatible endpoint (there is no in-cluster MinIO).
  S3_ENDPOINT: "https://s3.us-east-1.amazonaws.com"
  S3_BUCKET: "thoughty-attachments"
  S3_REGION: "us-east-1"
  # PostgreSQL backup object storage. Use a dedicated bucket or prefix with
  # lifecycle rules for the retention targets in docs/operations.md.
  POSTGRES_BACKUP_ENDPOINT: "https://s3.us-east-1.amazonaws.com"
  POSTGRES_BACKUP_BUCKET: "thoughty-postgres-backups"
  POSTGRES_BACKUP_REGION: "us-east-1"
  POSTGRES_BACKUP_BASE_PREFIX: "base"
  POSTGRES_BACKUP_WAL_PREFIX: "wal"
  # Shared throttling storage for multi-replica API deployments.
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  # Short-lived in-process cache for repeated entry-list reads on each API pod.
  ENTRIES_CACHE_TTL_SECONDS: "30"
  ENTRIES_CACHE_MAX_KEYS: "500"
  # Default model used for AI auto-tagging when a user has not overridden it.
  OPENROUTER_TAG_MODEL: "openai/gpt-4o-mini"
