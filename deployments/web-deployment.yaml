apiVersion: apps/v1
kind: Deployment
metadata:
  name: thoughty-web
  namespace: thoughty
  labels:
    app: thoughty-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: thoughty-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: thoughty-web
    spec:
      containers:
        - name: thoughty-web
          image: thoughty-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: thoughty-web
  namespace: thoughty
spec:
  selector:
    app: thoughty-web
  ports:
    - port: 80
      targetPort: 80
